name: Update README Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (reliable)

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject dynamic cache buster into stats URLs
        run: |
          TIMESTAMP=$(date +%s)

          # Replace all cacheBuster=XXXXXXX with fresh timestamp
          sed -i "s/cacheBuster=[0-9]*/cacheBuster=$TIMESTAMP/g" README.md

          # If no cacheBuster exists yet, add to each stats URL
          sed -i "s/github-readme-streak-stats\.herokuapp\.com\/?\(user=master-bry[^\"&]*\)\"/github-readme-streak-stats.herokuapp.com\/?\1\&cacheBuster=$TIMESTAMP\"/g" README.md

      - name: Commit & push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: refresh stats cache [skip ci]" && git push)
