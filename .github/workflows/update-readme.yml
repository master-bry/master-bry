name: Refresh README Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← this was the missing fix

      - name: Refresh cacheBuster timestamp
        run: |
          TIMESTAMP=$(date +%s)
          echo "New timestamp: $TIMESTAMP"

          python3 - "$TIMESTAMP" <<'PYEOF'
          import re, pathlib, sys

          timestamp = sys.argv[1]
          readme = pathlib.Path("README.md")
          content = readme.read_text(encoding="utf-8")

          pattern = r'(https://github-readme-streak-stats\.herokuapp\.com/\?user=master-bry[^"]*)'

          def refresh(m):
              url = re.sub(r'[?&]cacheBuster=\d+', '', m.group(1))
              sep = '&' if '?' in url else '?'
              return url + sep + 'cacheBuster=' + timestamp

          updated = re.sub(pattern, refresh, content)

          if updated == content:
              print("No changes detected.")
          else:
              readme.write_text(updated, encoding="utf-8")
              print("README updated.")
          PYEOF

      - name: Show diff
        run: git diff README.md || echo "No changes."

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "Nothing to commit — skipping."
          else
            git add README.md
            git commit -m "chore: refresh stats cache [skip ci]"
            git push
          fi
