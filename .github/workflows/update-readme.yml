name: Update README Stats

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/6 * * * *'  # Kila masaa 6
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update cacheBuster in streak stats URL
        run: |
          TIMESTAMP=$(date +%s)
          echo "Timestamp: $TIMESTAMP"

          python3 - <<PYEOF
          import re, pathlib

          readme_path = pathlib.Path("README.md")
          content = readme_path.read_text(encoding="utf-8")

          def replace_cache_buster(match):
              url = match.group(1)
              # Ondoa cacheBuster iliyopo
              url = re.sub(r'[?&]cacheBuster=\d+', '', url)
              # Ongeza mpya — & kwa sababu URL ina ? tayari
              return 'src="' + url + '&cacheBuster=$TIMESTAMP"'

          # Badilisha streak stats URL peke yake (inayomilikiwa na master-bry)
          pattern = r'src="(https://github-readme-streak-stats\.herokuapp\.com/\?user=master-bry[^"]*)"'
          updated = re.sub(pattern, replace_cache_buster, content)

          readme_path.write_text(updated, encoding="utf-8")
          print("README imesasishwa.")
          PYEOF

          # Ingiza TIMESTAMP halisi
          sed -i "s/cacheBuster=\\\$TIMESTAMP/cacheBuster=$TIMESTAMP/g" README.md

      - name: Onyesha mabadiliko
        run: git diff README.md || echo "Hakuna mabadiliko."

      - name: Commit na push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md; then
            echo "Hakuna mabadiliko — skip."
          else
            git add README.md
            git commit -m "chore: refresh stats cache [skip ci]"
            git push
          fi
