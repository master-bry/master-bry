name: Update README Stats

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update cache buster in README
        run: |
          TIMESTAMP=$(date +%s)
          
          # More robust pattern matching for GitHub stats URLs
          # This handles multiple common stats image formats
          sed -i "s|\(https://github-readme-streak-stats\.herokuapp\.com/?user=master-bry[^?&\"')]*\)[?&]cacheBuster=[0-9]*|\1?cacheBuster=$TIMESTAMP|g" README.md
          sed -i "s|\(https://github-readme-streak-stats\.herokuapp\.com/?user=master-bry[^?&\"')]*\)\?cacheBuster=[0-9]*|\1?cacheBuster=$TIMESTAMP|g" README.md
          sed -i "s|\(https://github-readme-streak-stats\.herokuapp\.com/?user=master-bry[^?&\"')]*\)|\1?cacheBuster=$TIMESTAMP|g" README.md
          
          # Also handle if there are any existing cache busters without the ? properly
          sed -i "s/cacheBuster=[0-9]*/cacheBuster=$TIMESTAMP/g" README.md

      - name: Debug - Show changes
        run: |
          git diff README.md || echo "No changes detected"

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet README.md; then
            echo "No changes to commit"
          else
            git add README.md
            git commit -m "chore: refresh stats cache [skip ci]"
            git push
          fi
